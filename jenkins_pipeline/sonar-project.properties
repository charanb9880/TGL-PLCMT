sonar.projectKey=placement-intelligence
sonar.projectName=Placement Intelligence System
sonar.projectVersion=1.0

# Path to source directories
sonar.sources=frontend/src,backend,intelligence_pipeline
sonar.exclusions=**/node_modules/**,**/venv/**,**/__pycache__/**,**/*.test.js,**/*.spec.js,**/coverage/**

# Backend (Python) configuration
sonar.python.version=3.11
sonar.python.coverage.reportPaths=backend/coverage.xml,intelligence_pipeline/coverage.xml

# Frontend (JavaScript/React) configuration
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Quality Gate requirements
sonar.qualitygate.wait=true
