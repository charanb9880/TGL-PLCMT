<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Placement Intelligence — Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top left, #ffffff 0%, #f7f7f5 45%, #eff3f7 100%);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #09090b;
      }

      main {
        max-width: 640px;
        padding: 32px;
        border: 1px solid #e4e4e7;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
      }

      h1 {
        font-size: clamp(2.5rem, 4vw, 4rem);
        margin: 0 0 12px;
      }

      p {
        line-height: 1.7;
        color: #52525b;
      }
    </style>
  </head>
  <body>
    <main>
      <p style="text-transform: uppercase; letter-spacing: 0.3em; font-size: 12px; color: #71717a">Offline mode</p>
      <h1>You’re offline right now.</h1>
      <p>
        The app shell is still available, but live company data and analytics need a connection to refresh.
        Reconnect and reopen the app to continue your placement review.
      </p>
    </main>
  </body>
</html>
