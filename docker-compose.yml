
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8000
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
      - agent
    networks:
      - pes-network
    # Required for React hot-reloading in Docker
    volumes:
      - ./frontend/src:/app/src

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - pes-network

  agent:
    build:
      context: ./intelligence_pipeline
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    networks:
      - pes-network

networks:
  pes-network:
    driver: bridge
